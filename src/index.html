<!DOCTYPE html>
<html lang="hu">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' file: data:; connect-src *;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spoty</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="container">
    <div class="header">
      <div class="mode-tabs">
        <div class="tab-pill origin-left"></div>
        <button class="mode-btn active" id="btn-normal" data-i18n="tab_search" tabindex="1">Keresés</button>
        <button class="mode-btn" id="btn-ai" data-i18n="tab_ai" tabindex="2">AI Mód</button>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="btn-new-chat" title="Új beszélgetés" style="display: none;" tabindex="3">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button class="settings-btn" id="btn-settings" title="Beállítások" tabindex="4">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"></circle>
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
            </path>
          </svg>
        </button>
      </div>
    </div>
    <div class="search-bar">
      <div class="search-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </div>
      <input id="search" type="text" data-i18n-placeholder="search_placeholder"
        placeholder="Keresés alkalmazások, fájlok, parancsok között..." autocomplete="off" spellcheck="false">
      <button id="clear-btn" style="display: none;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <div class="results-wrapper">
      <div id="results"></div>
    </div>

    <div class="footer" id="footer" style="display: none;">
      <div class="footer-hint">
        <kbd>↵</kbd> <span data-i18n="footer_open">Megnyitás</span>
      </div>
      <div class="footer-hint" title="Mappa megnyitása">
        <kbd>⇧</kbd>+<kbd>↵</kbd> <span data-i18n="footer_folder">Mappa</span>
      </div>
      <div class="footer-hint">
        <kbd>↓</kbd> <kbd>↑</kbd> <span data-i18n="footer_nav">Navigáció</span>
      </div>
      <div class="footer-hint">
        <kbd>esc</kbd> <span data-i18n="footer_close">Bezárás</span>
      </div>
    </div>

    <!-- Settings Overlay -->
    <div class="settings-overlay" id="settings-overlay" style="display: none;">
      <div class="settings-header">
        <h3 data-i18n="settings_title">Beállítások</h3>
        <button class="close-settings" id="btn-close-settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="settings-body">
        <nav class="settings-tabs" id="settings-tabs">
          <button class="settings-tab active" data-tab="general">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.6 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.6a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            <span data-i18n="settings_general">Általános</span>
            <kbd class="tab-kbd">1</kbd>
          </button>
          <button class="settings-tab" data-tab="search">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            <span data-i18n="settings_search_tab">Keresés</span>
            <kbd class="tab-kbd">2</kbd>
          </button>
          <button class="settings-tab" data-tab="modules">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            <span data-i18n="settings_modules_tab">Modulok</span>
            <kbd class="tab-kbd">3</kbd>
          </button>
          <button class="settings-tab" data-tab="ai">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7h1a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-1.27a7 7 0 0 1-12.46 0H6a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1h1a7 7 0 0 1 7-7h1V5.73c-.6-.34-1-.99-1-1.73a2 2 0 0 1 2-2z"></path><circle cx="9.5" cy="15.5" r="1"></circle><circle cx="14.5" cy="15.5" r="1"></circle></svg>
            <span data-i18n="settings_ai">AI Mód</span>
            <kbd class="tab-kbd">4</kbd>
          </button>
          <button class="settings-tab" data-tab="aliases">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
            <span data-i18n="settings_aliases_tab">Aliasok</span>
            <kbd class="tab-kbd">5</kbd>
          </button>
        </nav>
        <div class="settings-panels">
          <!-- General Panel -->
          <div class="settings-panel active" data-panel="general">
            <div class="setting-group">
              <label class="setting-row">
                <span data-i18n="settings_lang">Nyelv</span>
                <select id="set-language" class="select-input small" style="width: auto;">
                  <option value="hu">Magyar</option>
                  <option value="en">English</option>
                </select>
              </label>
              <label class="setting-row">
                <span data-i18n="settings_theme">Téma</span>
                <select id="set-theme" class="select-input small" style="width: auto;">
                  <option value="dark" data-i18n="theme_dark">Sötét</option>
                  <option value="light" data-i18n="theme_light">Világos</option>
                  <option value="ocean" data-i18n="theme_ocean">Óceán</option>
                  <option value="forest" data-i18n="theme_forest">Erdő</option>
                  <option value="midnight" data-i18n="theme_midnight">Éjfél (OLED)</option>
                </select>
              </label>
              <label class="setting-row">
                <span data-i18n="settings_hotkey">Gyorsbillentyű</span>
                <input type="text" id="set-hotkey" value="Alt+Space" class="text-input small" style="width: 120px;"
                  spellcheck="false" title="Példa: Alt+Space, Super+Space">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_autolaunch">Indítás a rendszerrel</span>
                <input type="checkbox" id="set-autolaunch" class="toggle-switch">
              </label>
            </div>
          </div>

          <!-- Search Panel -->
          <div class="settings-panel" data-panel="search">
            <div class="setting-group">
              <label class="setting-row">
                <span data-i18n="settings_files">Fájlok keresése</span>
                <input type="checkbox" id="set-enable-files" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_bookmarks">Könyvjelzők keresése</span>
                <input type="checkbox" id="set-enable-bookmarks" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_web">Webes Keresés (g vagy ?)</span>
                <input type="checkbox" id="set-enable-web" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_max">Max találatok száma</span>
                <input type="number" id="set-max-results" min="1" max="20" value="8" class="text-input small">
              </label>
            </div>
          </div>

          <!-- Modules Panel -->
          <div class="settings-panel" data-panel="modules">
            <div class="setting-group">
              <label class="setting-row">
                <span data-i18n="settings_sys">Rendszer Parancsok (lock, sleep...)</span>
                <input type="checkbox" id="set-enable-sys" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_calc">Számológép</span>
                <input type="checkbox" id="set-enable-calc" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_clip">Vágólap (clip)</span>
                <input type="checkbox" id="set-enable-clip" class="toggle-switch">
              </label>
            </div>
          </div>

          <!-- AI Panel -->
          <div class="settings-panel" data-panel="ai">
            <div class="setting-group">
              <label class="setting-row">
                <span data-i18n="settings_provider">Szolgáltató</span>
                <select id="set-ai-provider" class="select-input">
                  <option value="openai">OpenAI (ChatGPT)</option>
                  <option value="gemini">Google Gemini</option>
                  <option value="ollama">Ollama (Helyi)</option>
                </select>
              </label>

              <!-- OpenAI Settings -->
              <div id="openai-settings-block">
                <label class="setting-row vertical">
                  <span data-i18n="settings_openai_key">OpenAI API Kulcs</span>
                  <input type="password" id="set-openai-api-key" placeholder="sk-..." class="text-input" spellcheck="false">
                </label>
                <label class="setting-row">
                  <span data-i18n="settings_model">Modell</span>
                  <select id="set-openai-model" class="select-input">
                    <option value="gpt-4o-mini">GPT-4o Mini</option>
                    <option value="gpt-4o">GPT-4o</option>
                    <option value="gpt-4.1-mini">GPT-4.1 Mini</option>
                    <option value="gpt-4.1">GPT-4.1</option>
                  </select>
                </label>
              </div>

              <!-- Gemini Settings -->
              <div id="gemini-settings-block" style="display: none;">
                <label class="setting-row vertical">
                  <span data-i18n="settings_gemini_key">Gemini API Kulcs</span>
                  <input type="password" id="set-gemini-api-key" placeholder="AIzaSy..." class="text-input"
                    spellcheck="false">
                </label>
                <label class="setting-row">
                  <span data-i18n="settings_model">Modell</span>
                  <select id="set-gemini-model" class="select-input">
                    <option value="gemini-2.5-flash">Gemini 2.5 Flash</option>
                    <option value="gemini-2.5-pro">Gemini 2.5 Pro</option>
                  </select>
                </label>
              </div>

              <!-- Ollama Settings -->
              <div id="ollama-settings-block" style="display: none;">
                <label class="setting-row vertical">
                  <span data-i18n="settings_ollama_url">Ollama URL</span>
                  <input type="text" id="set-ollama-url" placeholder="http://localhost:11434" class="text-input"
                    spellcheck="false">
                </label>
                <label class="setting-row vertical">
                  <span data-i18n="settings_model">Modell</span>
                  <input type="text" id="set-ollama-model" placeholder="llama3.2" class="text-input" spellcheck="false">
                </label>
              </div>

              <label class="setting-row">
                <span data-i18n="settings_ai_history">Csevegési előzmények mentése</span>
                <input type="checkbox" id="set-ai-history" class="toggle-switch">
              </label>
              <label class="setting-row">
                <span data-i18n="settings_ai_context">Kontextus megőrzése (csevegés)</span>
                <input type="checkbox" id="set-ai-context" class="toggle-switch">
              </label>
            </div>
          </div>

          <!-- Aliases Panel -->
          <div class="settings-panel" data-panel="aliases">
            <div class="setting-group">
              <p class="setting-hint" data-i18n="settings_aliases_hint">Használj JSON formátumot a parancsokhoz.</p>
              <textarea id="set-aliases" class="text-input" spellcheck="false"
                style="min-height: 160px; width: 100%; font-family: monospace; font-size: 11px; margin-top: 8px;"
                placeholder='{\n  "work": ["https://mail.google.com", "code ~/project"]\n}'></textarea>
            </div>
          </div>
        </div>
      </div>
      <div class="settings-footer">
        <div class="settings-footer-hints">
          <span class="footer-hint"><kbd>1</kbd>–<kbd>5</kbd> <span data-i18n="settings_nav_tabs">Váltás</span></span>
          <span class="footer-hint"><kbd>Tab</kbd> <span data-i18n="footer_nav">Navigáció</span></span>
          <span class="footer-hint"><kbd>Esc</kbd> <span data-i18n="footer_close">Bezárás</span></span>
        </div>
        <button id="btn-save-settings" class="primary-btn" data-i18n="settings_save">Mentés</button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked@15.0.7/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.1/dist/purify.min.js"></script>
  <script src="renderer.js"></script>
</body>

</html>
